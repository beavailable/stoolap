name: Update

on:
  workflow_dispatch:
    inputs:
      force_release:
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '33 * * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release-tag: ${{ steps.update.outputs.release-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Update
        id: update
        run: ./update.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENV_FORCE_RELEASE: ${{ inputs.force_release }}
  build:
    needs: update
    if: ${{ needs.update.outputs.release-tag != '' }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          repository: stoolap/stoolap
          ref: ${{ needs.update.outputs.release-tag }}
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}
      - name: Build
        run: cargo build --bins --release && mv target/release/stoolap target/release/stoolap_${{ matrix.arch }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: stoolap_${{ matrix.arch }}
          path: target/release/stoolap_${{ matrix.arch }}
  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true
      - name: Upload to OBS
        uses: beavailable/obs-upload@main
        with:
          pre-run: git add stoolap_* && git -c user.name='beavailable' -c user.email='beavailable@proton.me' commit -m 'Add files'
          username: beavailable
          password: ${{ secrets.OBS_PASSWORD }}
          project: home:beavailable
          package: stoolap
          type: deb
